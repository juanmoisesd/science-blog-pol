# Site configuration for SEO and Jekyll
title: Blog o Psychologii i Neuronauce
description: Naukowy portal w jezyku polskim - Dr. Juan Moises de la Serna
url: https://juanmoisesd.github.io/science-blog-pol
baseurl: /science-blog-pol

# Author information
author:
  name: Dr. Juan Moises de la Serna
    url: https://orcid.org/0000-0002-8401-8018

    # SEO Configuration
    locale: pl_PL
    lang: pl
    keywords: psychologia, neuronauka, badania naukowe, psychologia kognitywna, neurobiologia

    # Jekyll configuration
    markdown: kramdown
    theme: jekyll-theme-minimal

    # Plugins for SEO - VERY IMPORTANT
    plugins:
      - jekyll-sitemap
        - jekyll-seo-tag

        # Sitemap configuration
        sitemap:
          path: /sitemap.xml

          # SEO Tags
          seo_tag:
            twitter: juanmoisesd
              facebook: juanmoisesd

              # Collections for better organization
              collections:
                psychologia:
                    output: true
                        permalink: /psychologia/:name
                          neuronauka:
                              output: true
                                  permalink: /neuronauka/:name

                                  # Exclude from processing
                                  exclude:
                                    - .gitignore
                                      - README.md
                                        - Gemfile
                                          - Gemfile.lock
                                            - vendor
                                              - node_modules
                                                - .sass-cache
                                                  - .jekyll-cache
                                                    - .jekyll-metadata

                                                    # Build settings
                                                    include:
                                                      - sitemap.xml
                                                        - robots.txt
                                                          - .htaccess

                                                          # Future posts
                                                          future: false

                                                          # Permalink structure
                                                          permalink: /:categories/:title/ Dr. Juan Moises de la Serna
