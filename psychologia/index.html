  cards.push(h);
  grid.innerHTML+=h;
}
function filter(){
  var q=document.getElementById('search').value.toLowerCase();
  var items=grid.querySelectorAll('.pc');
  items.forEach(function(el){el.style.display=el.dataset.title.includes(q)?'':'none'});
}
</script>
